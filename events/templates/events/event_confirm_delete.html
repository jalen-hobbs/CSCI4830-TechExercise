{% extends "events/base.html" %}

{% block content %}
    <h2>Delete Event</h2>
    <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button class="btn" type="submit">Yes, delete</button>
        <a class="btn" href="{% url 'event_detail' object.pk %}">Cancel</a>
    </form>
{% endblock %}
