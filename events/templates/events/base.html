<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>easyPlan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
        }
        a {
            text-decoration: none;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-right: 8px;
        }
        .event-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .form-row {
            margin-bottom: 12px;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .errorlist {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1><a href="{% url 'event_list' %}">Calendar Planner</a></h1>
            <a class="btn" href="{% url 'event_create' %}">+ Add Event</a>
        </div>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
